<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Белешки | Notes App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: #2563eb;
      color: white;
      padding: 1.5rem 2rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.8rem; }
    header p { opacity: 0.85; font-size: 0.9rem; margin-top: 0.3rem; }
    main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .form-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 2rem;
    }
    .form-card h2 { margin-bottom: 1rem; color: #2563eb; font-size: 1.1rem; }
    input, textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: #2563eb; }
    textarea { height: 100px; resize: vertical; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }
    .notes-list { display: flex; flex-direction: column; gap: 1rem; }
    .note-card {
      background: white;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    .note-card .note-body { flex: 1; }
    .note-card h3 { font-size: 1.1rem; color: #1e3a8a; margin-bottom: 0.3rem; }
    .note-card p { color: #555; font-size: 0.95rem; white-space: pre-wrap; }
    .note-card .meta { font-size: 0.78rem; color: #9ca3af; margin-top: 0.5rem; }
    .actions { display: flex; flex-direction: column; gap: 0.5rem; }
    .actions button { padding: 0.5rem 0.9rem; font-size: 0.85rem; }
    .empty { text-align: center; color: #9ca3af; padding: 3rem; font-size: 1.1rem; }
    .status { padding: 0.5rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    .status.success { background: #d1fae5; color: #065f46; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }
  </style>
</head>
<body>
  <header>
    <h1>📝 Апликација за Белешки</h1>
    <p>Континуирана интеграција и испорака — Проектна задача</p>
  </header>

  <main>
    <div class="form-card">
      <h2>➕ Додај нова белешка</h2>
      <div id="status" class="status"></div>
      <input type="text" id="noteTitle" placeholder="Наслов на белешката..." />
      <textarea id="noteContent" placeholder="Содржина (опционално)..."></textarea>
      <button onclick="addNote()">Зачувај белешка</button>
    </div>

    <div id="notesList" class="notes-list">
      <div class="empty">Вчитување...</div>
    </div>
  </main>

  <script>
    const API = '/api/notes';

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
      setTimeout(() => { el.className = 'status'; }, 3000);
    }

    async function loadNotes() {
      try {
        const res = await fetch(API);
        const notes = await res.json();
        const list = document.getElementById('notesList');
        if (notes.length === 0) {
          list.innerHTML = '<div class="empty">Нема белешки. Додај ја првата!</div>';
          return;
        }
        list.innerHTML = notes.map(n => `
          <div class="note-card" id="note-${n.id}">
            <div class="note-body">
              <h3>${escHtml(n.title)}</h3>
              ${n.content ? `<p>${escHtml(n.content)}</p>` : ''}
              <div class="meta">${new Date(n.created_at).toLocaleString('mk-MK')}</div>
            </div>
            <div class="actions">
              <button class="btn-danger" onclick="deleteNote(${n.id})">Избриши</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('notesList').innerHTML =
          '<div class="empty">Грешка при поврзување со серверот.</div>';
      }
    }

    async function addNote() {
      const title = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteContent').value.trim();
      if (!title) { showStatus('Насловот е задолжителен!', 'error'); return; }
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content })
        });
        if (!res.ok) throw new Error('Грешка');
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').value = '';
        showStatus('Белешката е зачувана!', 'success');
        loadNotes();
      } catch (err) {
        showStatus('Грешка при зачувување!', 'error');
      }
    }

    async function deleteNote(id) {
      if (!confirm('Сигурен си дека сакаш да ја избришеш белешката?')) return;
      try {
        await fetch(`${API}/${id}`, { method: 'DELETE' });
        showStatus('Белешката е избришана.', 'success');
        loadNotes();
      } catch (err) {
        showStatus('Грешка при бришење!', 'error');
      }
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadNotes();
  </script>
</body>
</html>
