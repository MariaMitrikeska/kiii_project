version: '3.8'

services:

  
  db:
    image: postgres:16-alpine
    container_name: notes-db
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - notes-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notesdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  
  backend:
    build: ./backend
    container_name: notes-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: notesdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - notes-network
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  
  frontend:
    build: ./frontend
    container_name: notes-frontend
    ports:
      - "80:80"
    networks:
      - notes-network
    depends_on:
      - backend
    restart: on-failure

networks:
  notes-network:
    driver: bridge

volumes:
  postgres_data:
