apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: notes-app
type: Opaque
# Вредностите се base64 енкодирани
# "postgres" -> cG9zdGdyZXM=
# "notesdb"  -> bm90ZXNkYg==
# За да ги генерираш: echo -n "вредност" | base64
data:
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  POSTGRES_DB: bm90ZXNkYg==
