name: CI/CD Pipeline — Notes App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout кодот
        uses: actions/checkout@v4

      - name: Постави Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Инсталирај dependencies
        working-directory: ./backend
        run: npm install

      - name: Провери дека серверот може да се вчита (синтакса)
        working-directory: ./backend
        run: node --check server.js


  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout кодот
        uses: actions/checkout@v4

      - name: Постави Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Најави се на DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build и Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/notes-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/notes-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      
      - name: Build и Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/notes-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/notes-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Сумирај резултати
        run: |
          echo "## Docker Images Successfully Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/notes-backend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/notes-frontend:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
